name: Build

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Build sdist
        run: uv build --sdist -Ccompile-args="--verbose"

      - name: Upload sdist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  build-wheels:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04, ubuntu-24.04-arm, windows-latest, macos-26]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        with:
          extras: uv

      - name: Fix tag
        shell: bash
        run: |
          cd wheelhouse
          for whl in *.whl; do
            uvx wheel tags --remove --python-tag py3 --abi-tag none $whl
          done

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: wheels-${{ matrix.runner }}
          path: ./wheelhouse/*.whl
