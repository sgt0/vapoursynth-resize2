name: Build

on:
  push:
    branches: [master]
    tags: ["*"]
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build arch=x86_64-windows
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6.0.2

    - uses: msys2/setup-msys2@v2
      with:
        msystem: mingw64
        update: true
        pacboy: >-
          git:
          cmake:p
          meson:p
          gcc:p
          uv:p
          vapoursynth:p

    - name: Build wheel
      run: uv build --sdist --wheel -Csetup-args="-Dlink-static=true" -Ccompile-args="--verbose"

    - name: Upload
      uses: actions/upload-artifact@v7.0.0
      with:
        name: resize2-x86_64-windows
        path: dist/*.whl

  build-unix:
    strategy:
      matrix:
        include:
        - arch: x86_64-linux
          runs-on: ubuntu-latest
        - arch: aarch64-linux
          runs-on: ubuntu-24.04-arm
        - arch: aarch64-darwin
          runs-on: macos-26
      fail-fast: false
    name: Build arch=${{ matrix.arch }}
    runs-on: ${{ matrix.runs-on }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2

    - name: Install Nix
      uses: cachix/install-nix-action@v31.5.2
      with:
        nix_path: nixpkgs=channel:nixpkgs-unstable

    - name: Set up Nix cache
      uses: cachix/cachix-action@v17
      with:
        name: vs-nix-overlay

    - name: Configure and build
      run: |
        nix develop -c meson setup builddir --buildtype release
        nix develop -c meson compile -C builddir

    - name: Build wheel
      run: nix develop -c uv build --sdist --wheel -Ccompile-args="--verbose"

    - uses: actions/upload-artifact@v7.0.0
      with:
        name: resize2-${{ matrix.arch }}
        path: dist/*.whl
